<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLite - To DO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="todo">
    <header class="header">
        <div class="container header_container">
            <div class="header_title">TaskLite</div>
        </div>

        <nav class="tabs">
            <a href="index.html" class="tab active">To Do</a>
            <a href="index.html" class="tab">Kanban</a>
            <a href="index.html" class="tab">Привычки</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title">To Do</h1>
        
        <!-- Панель инструментов -->
        <div class="toolbar">
            <div class="toolbar_search">
                <input type="text" class="toolbar_search-input" placeholder="Поиск задач...">
            </div>
            <div class="tabs toolbar_tabs">
                <button class="tabs_item tabs_item--active">Все</button>
                <button class="tabs_item">Активные</button>
                <button class="tabs_item">Завершённые</button>
            </div>
            <select class="toolbar_sort">
                <option value="date">По дате</option>
                <option value="priority">По приоритету</option>
                <option value="name">По названию</option>
                <option>Название A→Z</option>
                <option>Название Z→A</option>
            </select>
        </div>

        <div class="form-add">
            <input class="form-add_input" type="text" placeholder="Введите задачу" />
            <button class="form-add_button" type="button">Добавить</button>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
